---
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: exploitiq-mcp-server-on-push
  annotations:
    pipelinesascode.tekton.dev/on-event: "[push]"
    pipelinesascode.tekton.dev/on-target-branch: "[main]"
    pipelinesascode.tekton.dev/on-cel-expression: >-
      event == "push" && "mcp-server/***".pathChanged()
    pipelinesascode.tekton.dev/task: "git-clone"
    pipelinesascode.tekton.dev/max-keep-runs: "5"
spec:
  params:
    - name: repo_url
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"
    - name: output-image
      value: quay.io/ecosystem-appeng/exploitiq-mcp-server:latest
    - name: path-context
      value: mcp-server
    - name: dockerfile
      value: ./mcp-server/Dockerfile
  pipelineSpec:
    params:
      - name: repo_url
      - name: revision
      - name: output-image
        description: Fully Qualified Output Image
        type: string
      - name: path-context
        default: mcp-server
        description: Path to the source code of an application's component from where to build image.
        type: string
      - name: dockerfile
        default: Dockerfile
        description: Path to the Dockerfile inside the context specified by parameter path-context
        type: string
    workspaces:
      - name: source
    tasks:
      - name: fetch-repository
        taskRef:
          resolver: cluster
          params:
            - name: kind
              value: task
            - name: name
              value: git-clone
            - name: namespace
              value: openshift-pipelines
        workspaces:
          - name: output
            workspace: source
        params:
          - name: URL
            value: $(params.repo_url)
          - name: REVISION
            value: $(params.revision)
      - name: buildah
        runAfter:
          - fetch-repository
        params:
          - name: IMAGE
            value: $(params.output-image)
          - name: DOCKERFILE
            value: $(params.dockerfile)
          - name: CONTEXT
            value: $(params.path-context)
          - name: BUILDER_IMAGE
            value: >-
              registry.redhat.io/rhel8/buildah@sha256:aac6629389db17e99894c5bee0da01d4c8065d11d8c6f6e1602f9484290baa70
        taskRef:
          resolver: cluster
          params:
            - name: kind
              value: task
            - name: name
              value: buildah
            - name: namespace
              value: openshift-pipelines
        workspaces:
          - name: source
            workspace: source
          - name: dockerconfig
            workspace: dockerconfig-ws
  workspaces:
  - name: source
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
  - name: dockerconfig-ws
    secret:
      secretName: ips-for-client-build